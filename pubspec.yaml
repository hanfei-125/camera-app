name: smart_camera_app
description: AI-powered camera app with intelligent shooting recommendations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # 相机功能
  camera: ^0.10.5+9
  image_picker: ^1.0.4

  # AI/ML
  google_mlkit_pose_detection: ^0.9.0
  google_mlkit_face_detection: ^0.8.0
  google_mlkit_image_labeling: ^0.9.0
  image: ^4.1.3

  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 网络与存储
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  http: ^1.1.0

  # 工具
  permission_handler: ^11.0.1
  intl: ^0.18.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
